<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura · Gestão Financeira Inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #080b14;
    --bg-mid: #0d1220;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.08);
    --glass-border-bright: rgba(255,255,255,0.15);
    --accent-cyan: #00d4ff;
    --accent-violet: #7c3aed;
    --accent-emerald: #10b981;
    --accent-amber: #f59e0b;
    --accent-rose: #f43f5e;
    --text-primary: #f0f4ff;
    --text-secondary: rgba(240,244,255,0.5);
    --text-muted: rgba(240,244,255,0.28);
    --blur-val: blur(24px);
    --radius-card: 20px;
    --radius-sm: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ORBS ── */
  .orb-field {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.18;
    animation: drift 20s ease-in-out infinite alternate;
  }
  .orb-1 { width: 600px; height: 600px; background: var(--accent-violet); top: -200px; left: -150px; animation-duration: 18s; }
  .orb-2 { width: 500px; height: 500px; background: var(--accent-cyan); bottom: -150px; right: -100px; animation-duration: 22s; }
  .orb-3 { width: 300px; height: 300px; background: var(--accent-emerald); top: 40%; left: 55%; animation-duration: 25s; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.08); }
  }

  /* ── LAYOUT ── */
  .app-wrapper { position: relative; z-index: 1; display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px; min-height: 100vh;
    background: rgba(13,18,32,0.7);
    backdrop-filter: var(--blur-val);
    border-right: 1px solid var(--glass-border);
    display: flex; flex-direction: column;
    padding: 28px 0; position: sticky; top: 0; height: 100vh;
  }
  .logo {
    padding: 0 24px 32px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 22px;
    background: linear-gradient(135deg, #fff 40%, var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-sub { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }

  .nav-section { padding: 0 12px; flex: 1; }
  .nav-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); padding: 6px 12px 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.2s; color: var(--text-secondary);
    font-size: 14px; font-weight: 500; margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .nav-item.active {
    background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(0,212,255,0.1));
    color: var(--text-primary);
    border: 1px solid rgba(124,58,237,0.3);
  }
  .nav-item .ni { font-size: 16px; width: 20px; text-align: center; }
  .nav-badge {
    margin-left: auto; background: var(--accent-violet);
    color: #fff; font-size: 10px; padding: 2px 7px;
    border-radius: 20px; font-weight: 600;
  }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--glass-border);
  }
  .user-chip {
    display: flex; align-items: center; gap: 10px;
  }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .user-info .name { font-size: 13px; font-weight: 600; }
  .user-info .plan { font-size: 11px; color: var(--accent-cyan); }

  /* ── MAIN ── */
  .main { flex: 1; padding: 32px; overflow-y: auto; }

  /* ── TOP BAR ── */
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; }
  .page-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .topbar-actions { display: flex; align-items: center; gap: 12px; }

  /* PRIVACY TOGGLE */
  .privacy-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 16px; border-radius: var(--radius-sm);
    background: var(--bg-card); border: 1px solid var(--glass-border);
    cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--text-secondary); transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .privacy-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .privacy-btn.active { background: rgba(0,212,255,0.1); border-color: var(--accent-cyan); color: var(--accent-cyan); }

  .add-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 18px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--accent-violet), #6366f1);
    border: none; cursor: pointer; font-size: 13px; font-weight: 600;
    color: #fff; transition: all 0.2s;
  }
  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }

  /* ── GLASS CARD ── */
  .glass-card {
    background: var(--bg-card);
    backdrop-filter: var(--blur-val);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-card);
    padding: 24px;
    transition: border-color 0.2s;
  }
  .glass-card:hover { border-color: var(--glass-border-bright); }

  /* ── KPI ROW ── */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-card { position: relative; overflow: hidden; }
  .kpi-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--kpi-color, var(--accent-violet))15, transparent);
    pointer-events: none;
  }
  .kpi-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .kpi-value {
    font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700;
    transition: filter 0.3s;
  }
  .kpi-value.blurred { filter: blur(8px); user-select: none; }
  .kpi-delta { font-size: 12px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
  .kpi-delta.up { color: var(--accent-emerald); }
  .kpi-delta.down { color: var(--accent-rose); }
  .kpi-icon {
    position: absolute; right: 20px; top: 20px;
    font-size: 28px; opacity: 0.15;
  }

  /* ── GRID 2COL ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .grid-3-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px; }

  /* ── SECTION HEADER ── */
  .section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
  .section-action {
    font-size: 12px; color: var(--accent-cyan); cursor: pointer;
    background: none; border: none; font-family: inherit;
    padding: 4px 8px; border-radius: 6px;
  }
  .section-action:hover { background: rgba(0,212,255,0.1); }

  /* ── CHART BAR ── */
  .chart-bars {
    display: flex; align-items: flex-end; gap: 8px;
    height: 120px; padding-top: 8px;
  }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar-track { flex: 1; width: 100%; position: relative; display: flex; align-items: flex-end; }
  .bar-fill {
    width: 100%; border-radius: 6px 6px 0 0;
    background: linear-gradient(180deg, var(--accent-violet), rgba(124,58,237,0.3));
    transition: height 0.8s cubic-bezier(.34,1.56,.64,1);
    position: relative; cursor: pointer;
  }
  .bar-fill.income { background: linear-gradient(180deg, var(--accent-cyan), rgba(0,212,255,0.2)); }
  .bar-fill:hover::after {
    content: attr(data-val);
    position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
    background: rgba(13,18,32,0.95); border: 1px solid var(--glass-border-bright);
    padding: 3px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap;
    color: var(--text-primary); pointer-events: none;
  }
  .bar-label { font-size: 10px; color: var(--text-muted); }

  /* ── TRANSACTIONS ── */
  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px; border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    transition: all 0.2s; cursor: pointer;
  }
  .tx-item:hover { background: var(--bg-card-hover); border-color: var(--glass-border); }
  .tx-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .tx-info { flex: 1; }
  .tx-name { font-size: 14px; font-weight: 500; }
  .tx-cat { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .tx-amount {
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    transition: filter 0.3s;
  }
  .tx-amount.blurred { filter: blur(6px); }
  .tx-amount.income { color: var(--accent-emerald); }
  .tx-amount.expense { color: var(--accent-rose); }
  .tx-date { font-size: 11px; color: var(--text-muted); text-align: right; }

  /* ── AI INSIGHTS ── */
  .ai-panel { }
  .ai-insight-card {
    padding: 16px; border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--glass-border);
    margin-bottom: 10px; cursor: pointer;
    transition: all 0.2s;
  }
  .ai-insight-card:hover { background: var(--bg-card-hover); border-color: rgba(124,58,237,0.4); }
  .ai-insight-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ai-tag {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 20px; font-weight: 600;
  }
  .ai-tag.warn { background: rgba(245,158,11,0.15); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.3); }
  .ai-tag.tip  { background: rgba(16,185,129,0.15); color: var(--accent-emerald); border: 1px solid rgba(16,185,129,0.3); }
  .ai-tag.pred { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
  .ai-insight-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
  .ai-confidence { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .ai-btn {
    width: 100%; padding: 12px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(0,212,255,0.1));
    border: 1px solid rgba(124,58,237,0.3);
    color: var(--text-primary); cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s; margin-top: 4px;
  }
  .ai-btn:hover { background: linear-gradient(135deg, rgba(124,58,237,0.35), rgba(0,212,255,0.2)); }
  .ai-btn.loading { opacity: 0.7; cursor: not-allowed; }
  .ai-spinner { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── GOALS ── */
  .goal-item { margin-bottom: 18px; }
  .goal-hdr { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
  .goal-name { font-size: 14px; font-weight: 500; }
  .goal-vals { font-size: 12px; color: var(--text-muted); }
  .goal-vals span.blurred { filter: blur(5px); display: inline-block; }
  .progress-track {
    height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent-violet), var(--accent-cyan));
    transition: width 1s cubic-bezier(.34,1.56,.64,1);
  }

  /* ── CATEGORY DONUTS ── */
  .cat-list { display: flex; flex-direction: column; gap: 10px; }
  .cat-item { display: flex; align-items: center; gap: 12px; }
  .cat-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .cat-label { font-size: 13px; flex: 1; }
  .cat-pct { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .cat-bar-track { flex: 2; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }

  /* ── RECEIPT VAULT ── */
  .receipt-drop {
    border: 2px dashed var(--glass-border-bright);
    border-radius: var(--radius-sm); padding: 24px;
    text-align: center; cursor: pointer;
    transition: all 0.2s; background: rgba(255,255,255,0.02);
  }
  .receipt-drop:hover, .receipt-drop.dragover {
    border-color: var(--accent-cyan);
    background: rgba(0,212,255,0.05);
  }
  .receipt-drop .drop-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
  .receipt-drop .drop-text { font-size: 13px; color: var(--text-secondary); }
  .receipt-list { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .receipt-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
  }
  .receipt-thumb {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(124,58,237,0.2));
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .receipt-info .rname { font-size: 13px; font-weight: 500; }
  .receipt-info .rval { font-size: 11px; color: var(--text-muted); }
  .receipt-badge {
    margin-left: auto; font-size: 9px; padding: 3px 8px;
    border-radius: 20px; background: rgba(16,185,129,0.15);
    color: var(--accent-emerald); border: 1px solid rgba(16,185,129,0.3);
    font-weight: 600; letter-spacing: 0.5px;
  }

  /* ── EXPORT PANEL ── */
  .export-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .export-opt {
    padding: 14px; border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .export-opt:hover { border-color: var(--accent-cyan); background: rgba(0,212,255,0.05); }
  .export-opt.selected { border-color: var(--accent-violet); background: rgba(124,58,237,0.1); }
  .export-opt .eo-icon { font-size: 24px; margin-bottom: 6px; }
  .export-opt .eo-label { font-size: 12px; font-weight: 600; }
  .export-opt .eo-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .export-generate {
    width: 100%; padding: 13px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--accent-emerald), #059669);
    border: none; color: #fff; font-family: inherit;
    font-size: 14px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s;
  }
  .export-generate:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(16,185,129,0.35); }

  /* ── FIREBASE STATUS ── */
  .firebase-strip {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 16px; border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
    margin-bottom: 24px;
  }
  .fb-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
  }
  .fb-dot { width: 6px; height: 6px; border-radius: 50%; }
  .fb-dot.online { background: var(--accent-emerald); box-shadow: 0 0 6px var(--accent-emerald); }
  .fb-dot.sync { background: var(--accent-amber); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
  .fb-name { color: var(--text-secondary); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(8,11,20,0.85);
    backdrop-filter: blur(8px); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: rgba(13,18,32,0.95); border: 1px solid var(--glass-border-bright);
    border-radius: 24px; padding: 32px; width: 460px; max-width: 95vw;
    transform: translateY(20px); transition: transform 0.3s;
    backdrop-filter: blur(24px);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
    color: var(--text-primary); font-family: inherit; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent-violet); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .type-btn {
    padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border);
    background: transparent; color: var(--text-secondary);
    cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600;
    transition: all 0.2s;
  }
  .type-btn.income.selected { background: rgba(16,185,129,0.15); border-color: var(--accent-emerald); color: var(--accent-emerald); }
  .type-btn.expense.selected { background: rgba(244,63,94,0.15); border-color: var(--accent-rose); color: var(--accent-rose); }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-cancel {
    flex: 1; padding: 12px; border-radius: 10px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    color: var(--text-secondary); cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 600;
  }
  .btn-save {
    flex: 2; padding: 12px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent-violet), #6366f1);
    border: none; color: #fff; cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 700;
  }

  /* ── TOAST ── */
  .toast-container { position: fixed; top: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 12px 20px; border-radius: 12px;
    backdrop-filter: blur(16px); border: 1px solid var(--glass-border-bright);
    font-size: 13px; font-weight: 500;
    transform: translateX(120%); transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    display: flex; align-items: center; gap: 10px; min-width: 280px;
  }
  .toast.show { transform: translateX(0); }
  .toast.success { background: rgba(16,185,129,0.15); color: var(--accent-emerald); }
  .toast.info    { background: rgba(0,212,255,0.1
